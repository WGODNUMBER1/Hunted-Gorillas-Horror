<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HGH TERMINAL</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Consolas, monospace;
            background: #02030a;
            color: #e5e7eb;
            overflow: hidden;
        }

        /* VHS scanlines */
        .vhs-scanlines {
            pointer-events: none;
            position: fixed;
            inset: 0;
            background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 100% 3px;
            mix-blend-mode: screen;
            opacity: 0.35;
        }

        /* Fog + particles */
        .fog {
            position: fixed;
            inset: -20%;
            background: radial-gradient(circle at 20% 0%, rgba(255,255,255,0.06), transparent 60%),
                        radial-gradient(circle at 80% 100%, rgba(255,255,255,0.05), transparent 60%);
            filter: blur(12px);
            opacity: 0.45;
            animation: fogMove 40s linear infinite;
            pointer-events: none;
        }

        @keyframes fogMove {
            0% { transform: translate3d(-20px, 0, 0); }
            50% { transform: translate3d(20px, 10px, 0); }
            100% { transform: translate3d(-20px, 0, 0); }
        }

        .particles {
            position: fixed;
            inset: 0;
            background-image:
                radial-gradient(circle, rgba(255,255,255,0.12) 1px, transparent 1px),
                radial-gradient(circle, rgba(255,255,255,0.08) 1px, transparent 1px);
            background-size: 120px 120px, 200px 200px;
            opacity: 0.25;
            animation: particlesDrift 30s linear infinite;
            pointer-events: none;
        }

        @keyframes particlesDrift {
            0% { transform: translate3d(0,0,0); }
            50% { transform: translate3d(-20px,10px,0); }
            100% { transform: translate3d(0,0,0); }
        }

        /* Background grid */
        .grid-bg {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(#0b1120 1px, transparent 1px),
                linear-gradient(90deg, #0b1120 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.6;
            animation: gridShift 20s linear infinite;
            pointer-events: none;
        }

        @keyframes gridShift {
            0% { transform: translate3d(0,0,0); }
            100% { transform: translate3d(-40px,-40px,0); }
        }

        /* Layout */
        .shell {
            position: relative;
            z-index: 10;
            display: grid;
            grid-template-columns: minmax(0, 1.2fr) minmax(0, 1fr);
            height: 100vh;
            padding: 32px 40px;
            gap: 32px;
        }

        /* Left terminal panel */
        .terminal-panel {
            border: 1px solid #1f2937;
            background: radial-gradient(circle at top left, #020617 0%, #02030a 55%, #000000 100%);
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
            padding: 20px 24px;
            position: relative;
            overflow: hidden;
        }

        .terminal-header {
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #9ca3af;
            margin-bottom: 8px;
        }

        .terminal-title {
            font-size: 26px;
            letter-spacing: 4px;
            font-weight: 700;
            color: #38bdf8;
            text-shadow: 0 0 12px rgba(56,189,248,0.9);
        }

        .terminal-log {
            margin-top: 16px;
            font-size: 12px;
            line-height: 1.5;
            color: #d1d5db;
            max-height: 60vh;
            overflow: hidden;
        }

        .log-line {
            opacity: 0;
            transform: translateY(4px);
            animation: logReveal 0.4s forwards;
        }

        @keyframes logReveal {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .cursor {
            display: inline-block;
            width: 8px;
            height: 14px;
            background: #38bdf8;
            margin-left: 4px;
            animation: cursorBlink 0.9s steps(1) infinite;
        }

        @keyframes cursorBlink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        /* Glitch overlay */
        .glitch-overlay {
            position: absolute;
            inset: 0;
            background:
                repeating-linear-gradient(180deg, rgba(255,255,255,0.08) 0, rgba(255,255,255,0.08) 1px, transparent 2px),
                repeating-linear-gradient(90deg, rgba(56,189,248,0.15) 0, transparent 2px);
            mix-blend-mode: screen;
            opacity: 0;
            pointer-events: none;
        }

        .glitch-active {
            animation: glitchFlash 0.6s ease-out;
        }

        @keyframes glitchFlash {
            0% { opacity: 0.9; transform: translate3d(0,0,0); }
            40% { opacity: 0.4; transform: translate3d(4px,-2px,0); }
            100% { opacity: 0; transform: translate3d(0,0,0); }
        }

        /* Right menu grid */
        .menu-panel {
            border: 1px solid #1f2937;
            background: radial-gradient(circle at top right, #020617 0%, #02030a 55%, #000000 100%);
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .menu-title {
            font-size: 13px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #9ca3af;
            margin-bottom: 16px;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 14px;
        }

        .menu-btn {
            position: relative;
            padding: 14px 16px;
            border-radius: 6px;
            border: 1px solid #1f2937;
            background: radial-gradient(circle at top, #020617 0%, #02030a 60%);
            color: #e5e7eb;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-align: left;
            cursor: pointer;
            overflow: hidden;
        }

        .menu-btn::before {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at top left, rgba(56,189,248,0.25), transparent 60%);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .menu-btn::after {
            content: "";
            position: absolute;
            inset: -1px;
            border-radius: 6px;
            border: 1px solid rgba(56,189,248,0.6);
            opacity: 0;
            box-shadow: 0 0 18px rgba(56,189,248,0.7);
            transition: opacity 0.2s;
        }

        .menu-btn span {
            position: relative;
            z-index: 1;
        }

        .menu-btn:hover::before,
        .menu-btn:hover::after {
            opacity: 1;
        }

        .menu-btn:hover {
            color: #f9fafb;
        }

        .menu-footer {
            font-size: 11px;
            color: #6b7280;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .menu-footer strong {
            color: #38bdf8;
        }

        /* Link reset */
        a.menu-link {
            text-decoration: none;
            color: inherit;
            display: block;
        }

        /* Intro overlay */
        .intro-overlay {
            position: fixed;
            inset: 0;
            background: #000000;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: #e5e7eb;
        }

        .intro-line {
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 6px;
            opacity: 0;
            transform: translateY(4px);
            animation: introLine 0.4s forwards;
        }

        @keyframes introLine {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .intro-title {
            margin-top: 18px;
            font-size: 24px;
            letter-spacing: 4px;
            font-weight: 700;
            color: #38bdf8;
            text-shadow: 0 0 14px rgba(56,189,248,0.9);
            opacity: 0;
            transform: translateY(6px);
            animation: introTitle 0.7s forwards;
            animation-delay: 1.4s;
        }

        @keyframes introTitle {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .intro-static {
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle, rgba(255,255,255,0.12) 1px, transparent 1px),
                radial-gradient(circle, rgba(255,255,255,0.08) 1px, transparent 1px);
            background-size: 4px 4px, 2px 2px;
            mix-blend-mode: screen;
            opacity: 0;
            animation: introStatic 0.7s ease-out;
            animation-delay: 2.1s;
        }

        @keyframes introStatic {
            0% { opacity: 0.9; }
            100% { opacity: 0; }
        }

        .intro-overlay.hide {
            animation: introFadeOut 0.7s ease-out forwards;
            animation-delay: 2.4s;
        }

        @keyframes introFadeOut {
            to {
                opacity: 0;
                visibility: hidden;
            }
        }

        @media (max-width: 900px) {
            .shell {
                grid-template-columns: minmax(0, 1fr);
                padding: 20px;
            }
            .menu-panel {
                margin-top: 12px;
            }
        }
    </style>
</head>
<body>
    <!-- VHS layers -->
    <div class="grid-bg"></div>
    <div class="fog"></div>
    <div class="particles"></div>
    <div class="vhs-scanlines"></div>

    <!-- Long VHS intro -->
    <div class="intro-overlay" id="intro">
        <div class="intro-static"></div>
        <div class="intro-line" style="animation-delay:0.1s;">BOOTING HGH VHS SYSTEM...</div>
        <div class="intro-line" style="animation-delay:0.4s;">LOADING TERMINAL MODULES...</div>
        <div class="intro-line" style="animation-delay:0.7s;">INITIALIZING HORROR INTERFACE...</div>
        <div class="intro-title">HGH TERMINAL</div>
    </div>

    <!-- Main layout -->
    <div class="shell">
        <!-- Left terminal -->
        <section class="terminal-panel">
            <div class="glitch-overlay" id="glitch"></div>
            <div class="terminal-header">HGH SYSTEM / TERMINAL</div>
            <div class="terminal-title" id="terminalTitle"></div>
            <div class="terminal-log" id="terminalLog"></div>
        </section>

        <!-- Right menu -->
        <section class="menu-panel">
            <div>
                <div class="menu-title">HGH MAIN HUB</div>
                <div class="menu-grid">
                    <a class="menu-link" href="index.html">
                        <button class="menu-btn"><span>HOME</span></button>
                    </a>
                    <a class="menu-link" href="monsters.html">
                        <button class="menu-btn"><span>MONSTERS</span></button>
                    </a>
                    <a class="menu-link" href="#">
                        <button class="menu-btn"><span>INFO</span></button>
                    </a>
                    <a class="menu-link" href="#">
                        <button class="menu-btn"><span>SNEAK PEAKS</span></button>
                    </a>
                    <a class="menu-link" href="#">
                        <button class="menu-btn"><span>OST</span></button>
                    </a>
                    <a class="menu-link" href="#">
                        <button class="menu-btn"><span>CHANGELOG</span></button>
                    </a>
                    <a class="menu-link" href="#">
                        <button class="menu-btn"><span>STATUS</span></button>
                    </a>
                </div>
            </div>
            <div class="menu-footer">
                <strong>HGH</strong> VHS HORROR SYSTEM / BUILD 0.1
            </div>
        </section>
    </div>

    <script>
        // Simple hover sound (optional: you can remove if you don't want it)
        let hoverAudio;
        try {
            hoverAudio = new Audio("data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAESsAACJWAAACABAAZGF0YQAAAAA=");
        } catch (e) {}

        document.querySelectorAll(".menu-btn").forEach(btn => {
            btn.addEventListener("mouseenter", () => {
                if (hoverAudio) {
                    hoverAudio.currentTime = 0;
                    hoverAudio.play().catch(() => {});
                }
            });
        });

        // Terminal typing + logs
        const titleText = "HGH TERMINAL";
        const titleEl = document.getElementById("terminalTitle");
        const logEl = document.getElementById("terminalLog");
        const glitchEl = document.getElementById("glitch");
        const introEl = document.getElementById("intro");

        const logs = [
            "[SYS] VHS core online.",
            "[SYS] Gorilla horror modules loaded.",
            "[NET] Hub routes: HOME / MONSTERS / INFO / SNEAK PEAKS / OST / CHANGELOG / STATUS.",
            "[SEC] Warning: entities detected in system.",
            "[USR] Access granted. Navigate using hub grid."
        ];

        function typeTitle(text, cb) {
            let i = 0;
            const interval = setInterval(() => {
                titleEl.textContent = text.slice(0, i);
                i++;
                if (i > text.length) {
                    clearInterval(interval);
                    cb && cb();
                }
            }, 80);
        }

        function showLogs() {
            logs.forEach((line, idx) => {
                const div = document.createElement("div");
                div.className = "log-line";
                div.style.animationDelay = (0.2 * idx) + "s";
                div.textContent = line;
                logEl.appendChild(div);
            });
            glitchEl.classList.add("glitch-active");
            setTimeout(() => glitchEl.classList.remove("glitch-active"), 700);
        }

        window.addEventListener("load", () => {
            // Hide intro after its animation
            introEl.classList.add("hide");
            setTimeout(() => {
                introEl.style.display = "none";
                typeTitle(titleText, showLogs);
            }, 2800);
        });
    </script>
</body>
</html>
